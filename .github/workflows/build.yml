name: Build and publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dataverse-mount

jobs:
  # The "mount-only" image. The default deliverable: small, no GCP.
  build-mount:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INCLUDE_GLOBUS=0
            RCLONE_REVISION=${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: type=gha,scope=mount
          cache-to: type=gha,mode=max,scope=mount

      - name: Make package public
        # Idempotent: every successful push to main re-asserts visibility.
        # GITHUB_TOKEN can't set package visibility (needs admin:packages
        # scope which it doesn't have), so we look for a user-supplied
        # PAT in the GHCR_VISIBILITY_TOKEN secret. If unset, the step
        # emits a warning and the package stays private — that's the
        # one-time gotcha the README calls out.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GHCR_VISIBILITY_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::GHCR_VISIBILITY_TOKEN secret not set; \
            package will remain private until manually flipped. Create a \
            classic PAT with admin:packages scope and save it as a \
            repository secret named GHCR_VISIBILITY_TOKEN to automate this."
            exit 0
          fi
          curl -sSf -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/dataverse-mount" \
            -d '{"visibility":"public"}' \
            && echo "Set dataverse-mount visibility=public" \
            || echo "::warning::failed to set package visibility (token scope?)"

  # The "mount + Globus" image. Same Dockerfile, INCLUDE_GLOBUS=1.
  build-mount-globus:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Distinguish from the mount-only tags by suffixing `-globus`.
          flavor: |
            suffix=-globus,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INCLUDE_GLOBUS=1
            RCLONE_REVISION=${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: type=gha,scope=mount-globus
          cache-to: type=gha,mode=max,scope=mount-globus
